<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>美國連線代購下單頁 — Cutie & Pick Kids</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FAF6F0;
  --sand:#F0E8DC;
  --warm:#E0CDB8;
  --sage-pale:#EAF2EE;
  --sage:#7A9E8E;
  --sage-mid:#5D8C7A;
  --sage-dark:#3D6B5A;
  --brown:#7A5C3A;
  --brown-lt:#C8946A;
  --brown-pale:#F5ECE4;
  --dark:#3D2B1A;
  --muted:#9A8878;
  --bdr:#DDD0C0;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;padding-bottom:90px}

/* ── HERO ── */
.hero{
  background:var(--sage-pale);
  border-bottom:1px solid #C8DDD6;
  padding:2.25rem 1.5rem 1.875rem;
  text-align:center;
}
.hero-inner{max-width:480px;margin:0 auto}
.hero-eyebrow{
  font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:3px;
  text-transform:uppercase;color:var(--sage-mid);margin-bottom:.875rem;display:block;
}
.hero-title{
  font-family:'Nunito',sans-serif;
  font-size:clamp(22px,6vw,30px);font-weight:800;
  color:var(--sage-dark);line-height:1.2;margin-bottom:.875rem;
}
.hero-title em{color:var(--brown-lt);font-style:normal}
.hero-desc{
  font-size:13px;color:var(--sage-dark);line-height:1.95;
  background:rgba(255,255,255,.65);border-radius:10px;
  padding:10px 16px;display:inline-block;
  border:1px solid #C8DDD6;margin-bottom:1.125rem;
}
.hero-desc strong{color:var(--brown);font-weight:500}
.hero-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.hero-pill{
  background:rgba(255,255,255,.7);border:1px solid #C8DDD6;
  border-radius:20px;padding:5px 14px;
  font-size:11px;color:var(--sage-dark);
  font-family:'Nunito',sans-serif;font-weight:600;
}

/* ── WRAP ── */
.wrap{max-width:600px;margin:0 auto;padding:1.5rem 1rem 2rem}

/* ── SECTION LABEL ── */
.sec-lbl{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:.875rem;
  display:flex;align-items:center;gap:10px;
  font-family:'Nunito',sans-serif;font-weight:700;
}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--warm)}

/* ── CATEGORY FILTER ── */
.cat-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.cat-btn{
  padding:7px 16px;
  border:1.5px solid var(--bdr);border-radius:20px;
  background:#fff;font-size:13px;
  font-family:'Nunito',sans-serif;font-weight:600;
  color:var(--muted);cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.cat-btn:active{transform:scale(.96)}
.cat-btn.on{
  background:var(--sage-dark);border-color:var(--sage-dark);color:#fff;
}
.cat-btn:hover:not(.on){border-color:var(--sage-mid);color:var(--sage-dark)}

/* ── PRODUCT GALLERY ── */
.prod-gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-bottom:1.5rem;
}
@media(min-width:480px){.prod-gallery{grid-template-columns:repeat(3,1fr);gap:14px}}

.gallery-card{
  background:#fff;border:2px solid transparent;
  border-radius:var(--r);overflow:hidden;
  cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .12s;
  position:relative;
}
.gallery-card:active{transform:scale(.96)}
.gallery-card.selected{border-color:var(--sage-mid);box-shadow:0 4px 16px rgba(61,107,90,.15)}
.gallery-card.out{opacity:.5;cursor:not-allowed}
.gallery-card.hidden{display:none}

.gallery-img{
  width:100%;aspect-ratio:1/1;
  background:var(--sage-pale);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--muted);text-align:center;line-height:1.5;padding:8px;
}
.gallery-img img{width:100%;height:100%;object-fit:cover;display:block}
.check-mark{
  position:absolute;top:8px;right:8px;
  width:22px;height:22px;background:var(--sage-mid);border-radius:50%;
  display:none;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:800;
}
.gallery-card.selected .check-mark{display:flex}

.gallery-info{padding:9px 10px 11px}
.gallery-code{
  font-size:9px;font-family:monospace;background:var(--sage-dark);
  color:#fff;border-radius:3px;padding:1px 6px;
  margin-bottom:5px;display:inline-block;letter-spacing:.5px;
}
.gallery-name{font-size:12px;font-weight:500;line-height:1.35;margin-bottom:3px;color:var(--dark)}
.gallery-price{font-size:14px;font-weight:700;color:var(--brown);font-family:'Nunito',sans-serif}
.gallery-stock{
  font-size:10px;padding:2px 6px;border-radius:5px;
  margin-top:3px;display:inline-block;font-family:'Nunito',sans-serif;font-weight:600;
}
.gs-low{background:#FFF3E0;color:#BF6000}
.gs-out{background:#FDECEA;color:#922B21}

/* ── CART SUMMARY (inline) ── */
.cart-wrap{margin-bottom:1.5rem}
.cart-box{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.cart-hd{
  padding:11px 16px;border-bottom:1px solid var(--bdr);
  font-size:13px;font-weight:500;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'Nunito',sans-serif;
}
.cart-badge{background:var(--brown);color:#fff;font-size:11px;padding:2px 10px;border-radius:10px;font-weight:700}
.cart-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--bdr);font-size:13px}
.cart-row:last-child{border-bottom:none}
.cart-item-info{flex:1;min-width:0;line-height:1.5}
.cart-item-sub{font-size:11px;color:var(--muted)}
.cart-price{font-weight:700;color:var(--brown);white-space:nowrap;font-family:'Nunito',sans-serif}
.cart-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:0 4px;flex-shrink:0;line-height:1}
.cart-del:active{color:#922B21}
.cart-total-row{padding:11px 16px;display:flex;justify-content:space-between;align-items:center;background:var(--sand)}
.cart-total-lbl{font-size:12px;color:var(--muted);font-family:'Nunito',sans-serif}
.cart-total-val{font-size:20px;font-weight:800;color:var(--dark);font-family:'Nunito',sans-serif}

/* ── FORM ── */
.form-card{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{font-size:11px;color:var(--muted);letter-spacing:.5px;display:block;margin-bottom:5px;font-family:'Nunito',sans-serif;font-weight:700}
.field input,.field textarea{
  width:100%;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:10px;
  font-size:15px;font-family:'Noto Sans TC',sans-serif;color:var(--dark);
  background:#fff;outline:none;transition:border-color .15s;-webkit-appearance:none;
}
.field input:focus,.field textarea:focus{border-color:var(--sage-mid)}
.field textarea{resize:vertical;min-height:68px;line-height:1.6}
.req{color:var(--brown-lt)}

/* ── SUBMIT ── */
.submit-btn{
  width:100%;padding:16px;background:var(--sage-dark);color:#fff;border:none;
  border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;letter-spacing:.5px;transition:background .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none;
}
.submit-btn:hover{background:var(--dark)}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{background:var(--muted);cursor:not-allowed}
.bottom-hint{text-align:center;margin-top:10px;font-size:11px;color:var(--muted);font-family:'Nunito',sans-serif}

/* ── FLOATING CART BTN ── */
.fab-cart{
  position:fixed;bottom:24px;right:20px;
  width:56px;height:56px;border-radius:50%;
  background:var(--brown);color:#fff;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(122,92,58,.4);
  z-index:50;transition:transform .15s,background .15s;
  font-size:22px;
}
.fab-cart:active{transform:scale(.9)}
.fab-cart:hover{background:var(--dark)}
.fab-count{
  position:absolute;top:-4px;right:-4px;
  min-width:20px;height:20px;padding:0 5px;
  background:#E53935;color:#fff;
  border-radius:10px;font-size:11px;font-weight:800;
  font-family:'Nunito',sans-serif;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;
}

/* ── MODAL BASE ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(40,30,20,.55);z-index:80;
  align-items:flex-end;justify-content:center;
  padding:0;
}
.modal-overlay.open{display:flex;animation:fadeBg .2s ease}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}

.modal-sheet{
  background:#fff;border-radius:20px 20px 0 0;
  width:100%;max-width:600px;
  max-height:88vh;overflow-y:auto;
  animation:slideUp .3s cubic-bezier(.34,1.15,.64,1);
}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

.sheet-handle{width:36px;height:4px;background:var(--warm);border-radius:2px;margin:12px auto 4px}
.sheet-close{position:absolute;top:14px;right:16px;background:var(--sage-pale);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.sheet-inner{padding:0 1.25rem 2rem;position:relative}

/* ── PRODUCT MODAL ── */
.modal-prod-preview{display:flex;gap:14px;align-items:center;padding:1rem 0 1rem;border-bottom:1px solid var(--bdr);margin-bottom:1rem}
.modal-thumb{
  width:70px;height:70px;border-radius:10px;
  background:var(--sage-pale);overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--muted);text-align:center;
}
.modal-thumb img{width:100%;height:100%;object-fit:cover}
.modal-prod-name{font-size:15px;font-weight:500;line-height:1.35;margin-bottom:4px}
.modal-prod-price{font-size:16px;font-weight:700;color:var(--brown);font-family:'Nunito',sans-serif}

.cfg-lbl{font-size:11px;color:var(--muted);margin-bottom:7px;font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:.3px}
.size-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.125rem}
.size-btn{
  padding:8px 15px;border:1.5px solid var(--bdr);border-radius:8px;
  font-size:13px;cursor:pointer;transition:all .15s;
  background:#fff;font-family:'Noto Sans TC',sans-serif;color:var(--dark);
  min-width:56px;text-align:center;
}
.size-btn:active{transform:scale(.93)}
.size-btn.on{background:var(--sage-dark);border-color:var(--sage-dark);color:#fff;font-weight:500}

.qty-row{display:flex;align-items:center;margin-bottom:1.25rem}
.qty-btn{
  width:40px;height:40px;border:1.5px solid var(--bdr);border-radius:8px;
  background:#fff;cursor:pointer;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;color:var(--dark);
}
.qty-btn:active{transform:scale(.88);background:var(--sand)}
.qty-num{font-size:20px;font-weight:800;min-width:52px;text-align:center;font-family:'Nunito',sans-serif}
.modal-subtotal{margin-left:auto;font-size:15px;font-weight:700;color:var(--brown);font-family:'Nunito',sans-serif}

.modal-add-btn{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:var(--sage-dark);color:#fff;
  font-size:15px;font-family:'Nunito',sans-serif;font-weight:800;
  cursor:pointer;transition:all .15s;letter-spacing:.3px;
}
.modal-add-btn:active{transform:scale(.97)}

/* ── CART MODAL ── */
.cart-modal-rows{margin-bottom:1rem}
.cart-modal-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--bdr);font-size:13px;
}
.cart-modal-row:last-child{border-bottom:none}
.cmi-info{flex:1;min-width:0;line-height:1.5}
.cmi-sub{font-size:11px;color:var(--muted)}
.cmi-price{font-weight:700;color:var(--brown);white-space:nowrap;font-family:'Nunito',sans-serif}
.cmi-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:0 4px;flex-shrink:0;line-height:1}
.cart-modal-total{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-top:1.5px solid var(--warm);margin-bottom:1.25rem;
}
.cart-modal-total-lbl{font-size:13px;color:var(--muted);font-family:'Nunito',sans-serif}
.cart-modal-total-val{font-size:22px;font-weight:800;color:var(--dark);font-family:'Nunito',sans-serif}
.cart-empty-msg{text-align:center;padding:2rem 0;color:var(--muted);font-size:14px;font-family:'Nunito',sans-serif}
.back-shop-btn{
  width:100%;padding:12px;border:1.5px solid var(--bdr);border-radius:12px;
  background:#fff;color:var(--muted);font-size:13px;
  font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;
  margin-bottom:10px;transition:all .15s;
}
.back-shop-btn:active{border-color:var(--sage-mid);color:var(--sage-dark)}
.checkout-btn{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:var(--sage-dark);color:#fff;
  font-size:15px;font-family:'Nunito',sans-serif;font-weight:800;
  cursor:pointer;transition:all .15s;
}
.checkout-btn:active{transform:scale(.97)}

/* ── SUCCESS SHEET ── */
.success-sheet{
  background:#fff;border-radius:20px 20px 0 0;
  width:100%;max-width:600px;
  max-height:88vh;overflow-y:auto;
  animation:slideUp .3s cubic-bezier(.34,1.15,.64,1);
}
.sheet-title{font-family:'Nunito',sans-serif;font-size:22px;font-weight:800;text-align:center;color:var(--dark);margin-bottom:4px}
.sheet-sub{
  font-size:13px;color:var(--muted);text-align:center;
  margin-bottom:1.25rem;line-height:1.8;
  background:var(--sage-pale);border-radius:8px;padding:10px 14px;
  border:1px solid #C8DDD6;
}
.sheet-sub strong{color:var(--sage-dark)}
.order-id-box{background:var(--sand);border-radius:10px;padding:12px 14px;margin-bottom:1rem;text-align:center;border:1px solid var(--warm)}
.order-id-lbl{font-size:11px;color:var(--muted);margin-bottom:3px;font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:.5px}
.order-id-val{font-size:19px;font-weight:700;font-family:monospace;color:var(--dark)}
.order-summary-box{border:1.5px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:1.25rem}
.sum-hd{background:var(--sand);padding:10px 14px;font-size:11px;font-weight:700;color:var(--muted);font-family:'Nunito',sans-serif;letter-spacing:.5px}
.sum-row{padding:10px 14px;border-top:1px solid var(--bdr);font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.sum-row-name{flex:1;min-width:0;line-height:1.4}
.sum-row-sub{font-size:11px;color:var(--muted)}
.sum-row-price{font-weight:700;color:var(--brown);font-family:'Nunito',sans-serif;white-space:nowrap}
.sum-total{padding:12px 14px;border-top:1.5px solid var(--warm);background:var(--sand);display:flex;justify-content:space-between;align-items:center}
.sum-total-lbl{font-size:12px;color:var(--muted);font-family:'Nunito',sans-serif}
.sum-total-val{font-size:18px;font-weight:800;color:var(--dark);font-family:'Nunito',sans-serif}
.line-cta-btn{
  width:100%;padding:15px;background:#06C755;color:#fff;border:none;border-radius:12px;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s;
  -webkit-appearance:none;
}
.line-cta-btn:active{background:#059C42}
.line-logo-circle{width:26px;height:26px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* toast */
.toast{
  position:fixed;bottom:96px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--dark);color:#fff;
  padding:10px 20px;border-radius:10px;
  font-size:13px;opacity:0;transition:all .25s;
  z-index:200;white-space:nowrap;
  font-family:'Nunito',sans-serif;font-weight:600;
  max-width:85vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <span class="hero-eyebrow">Cutie & Pick Kids</span>
    <div class="hero-title">美國連線<em>代購</em>下單頁</div>
    <div class="hero-desc">
      住於美國，<strong>親自購買、親自把關</strong><br>
      下標後等 <strong>15–30 天</strong>到貨
    </div>
    <div class="hero-pills">
      <span class="hero-pill">🇺🇸 美國直購</span>
      <span class="hero-pill">正品保證</span>
      <span class="hero-pill">LINE 聊更多</span>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- 分類篩選 -->
  <div class="sec-lbl">商品分類</div>
  <div class="cat-filter" id="catFilter">
    <button class="cat-btn on" onclick="setCat('all',this)">全部</button>
    <button class="cat-btn" onclick="setCat('A',this)">👕 嬰兒童裝</button>
    <button class="cat-btn" onclick="setCat('C',this)">📚 童書繪本</button>
    <button class="cat-btn" onclick="setCat('D',this)">🧸 玩具</button>
    <button class="cat-btn" onclick="setCat('E',this)">🏠 生活居家</button>
  </div>

  <!-- 商品圖片牆 -->
  <div class="sec-lbl">選擇商品</div>
  <div class="prod-gallery" id="prodGallery"></div>

  <!-- 購物清單（inline，有東西才顯示） -->
  <div class="cart-wrap" id="cartWrap" style="display:none">
    <div class="sec-lbl">購物清單</div>
    <div class="cart-box">
      <div class="cart-hd"><span>已選商品</span><span class="cart-badge" id="cartBadge">0 件</span></div>
      <div id="cartRows"></div>
      <div class="cart-total-row">
        <span class="cart-total-lbl">商品小計（運費另計）</span>
        <span class="cart-total-val" id="cartTotal">NT$ 0</span>
      </div>
    </div>
  </div>

  <!-- 客人資訊 -->
  <div class="sec-lbl">您的資訊</div>
  <div class="form-card">
    <div class="field">
      <label>LINE 名稱 <span class="req">*</span></label>
      <input id="lineName" placeholder="您在 LINE 的名稱或暱稱" autocomplete="name"/>
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <textarea id="note" placeholder="顏色偏好、尺寸不確定等，歡迎備註"></textarea>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitOrder()">
    確認送出下單
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="bottom-hint">送出後請跳轉 LINE 完成最後確認</div>
</div>

<!-- 浮動購物車按鈕 -->
<button class="fab-cart" id="fabCart" onclick="openCartModal()" style="display:none">
  🛍
  <span class="fab-count" id="fabCount">0</span>
</button>

<!-- 商品設定 Modal -->
<div class="modal-overlay" id="prodModal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="closeProdModal()">×</button>
    <div class="sheet-inner">
      <div class="modal-prod-preview">
        <div class="modal-thumb" id="modalThumb"></div>
        <div>
          <div class="modal-prod-name" id="modalName"></div>
          <div class="modal-prod-price" id="modalPrice"></div>
        </div>
      </div>
      <div id="modalSizeSection">
        <div class="cfg-lbl">選擇尺寸 <span style="color:var(--brown-lt)">*</span></div>
        <div class="size-row" id="modalSizeRow"></div>
      </div>
      <div class="cfg-lbl">數量</div>
      <div class="qty-row" style="margin-bottom:1.25rem">
        <button class="qty-btn" onclick="chQty(-1)">−</button>
        <span class="qty-num" id="qtyNum">1</span>
        <button class="qty-btn" onclick="chQty(1)">＋</button>
        <span class="modal-subtotal" id="modalSubtotal"></span>
      </div>
      <button class="modal-add-btn" onclick="addToCart()">＋ 加入購物清單</button>
    </div>
  </div>
</div>

<!-- 購物清單 Modal -->
<div class="modal-overlay" id="cartModal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="closeCartModal()">×</button>
    <div class="sheet-inner">
      <div style="font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;padding:.75rem 0 1rem;color:var(--dark)">
        購物清單 <span style="font-size:13px;color:var(--muted);font-weight:600" id="cartModalCount"></span>
      </div>
      <div class="cart-modal-rows" id="cartModalRows"></div>
      <div class="cart-modal-total">
        <span class="cart-modal-total-lbl">商品小計（運費另計）</span>
        <span class="cart-modal-total-val" id="cartModalTotal">NT$ 0</span>
      </div>
      <button class="back-shop-btn" onclick="closeCartModal()">← 繼續選購</button>
      <button class="checkout-btn" onclick="closeCartModal();document.getElementById('lineName').focus();document.getElementById('lineName').scrollIntoView({behavior:'smooth',block:'center'})">
        前往填寫資訊 →
      </button>
    </div>
  </div>
</div>

<!-- 成功 Modal -->
<div class="modal-overlay" id="successModal">
  <div class="success-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="sheet-title" style="margin-bottom:4px">購物車加入完成！🎉</div>
      <div class="sheet-sub">
        確認無誤後，請點下方綠色按鈕，<br>
        <strong>將訂單傳送到官方 LINE 後，才算下單成功唷！</strong>
      </div>
      <div class="order-id-box">
        <div class="order-id-lbl">訂單編號</div>
        <div class="order-id-val" id="successId">—</div>
      </div>
      <div class="order-summary-box">
        <div class="sum-hd">訂單明細</div>
        <div id="sumRows"></div>
        <div class="sum-total">
          <span class="sum-total-lbl">商品小計（運費另計）</span>
          <span class="sum-total-val" id="sumTotal">NT$ 0</span>
        </div>
      </div>
      <button class="line-cta-btn" onclick="jumpToLine()">
        <div class="line-logo-circle">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="#06C755"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.07 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
        </div>
        確認下標，傳送訂單明細至官方 LINE
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LINE_ID = "@892tzgju";

const PRODUCTS = [
  {id:'A01',cat:'A',name:"Carter's 有機棉連身衣三件組",desc:"100% 有機棉・格紋款",price:1280,img:'',sizes:['0-3M','3-6M','9-12M','1T'],stock:'available'},
  {id:'A02',cat:'A',name:"Gap Baby 牛仔外套",desc:"輕薄牛仔・春秋適穿",price:980,img:'',sizes:['2T','3T','4T','5T'],stock:'available'},
  {id:'A03',cat:'A',name:"Old Navy 連帽T恤",desc:"純棉・多色可選",price:560,img:'',sizes:['2T','3T','4T','5T'],stock:'low'},
  {id:'C01',cat:'C',name:"The Very Hungry Caterpillar",desc:"Eric Carle 經典繪本",price:420,img:'',sizes:[],stock:'available'},
  {id:'D01',cat:'D',name:"Fisher-Price 感統玩具組",desc:"促進感官發展・6M+",price:1350,img:'',sizes:[],stock:'available'},
  {id:'E01',cat:'E',name:"Johnson's 嬰兒沐浴組",desc:"溫和無淚配方",price:680,img:'',sizes:[],stock:'available'},
];

let currentCat = 'all';
let currentPid = null;
let currentSize = null;
let qty = 1;
let cartItems = [];
let lastOrderId = '';
let lastLineMsg = '';

// ── 分類 ──
function setCat(cat, btn){
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderGallery();
}

// ── 商品牆 ──
function renderGallery(){
  const filtered = currentCat==='all' ? PRODUCTS : PRODUCTS.filter(p=>p.cat===currentCat);
  document.getElementById('prodGallery').innerHTML = filtered.map(p=>`
    <div class="gallery-card ${p.stock==='out'?'out':''}"
      id="gc-${p.id}"
      onclick="${p.stock!=='out'?`openProdModal('${p.id}')`:''}"
    >
      <div class="check-mark">✓</div>
      <div class="gallery-img">
        ${p.img?`<img src="${p.img}" alt="${p.name}" loading="lazy">`
          :`<span style="font-size:11px;color:var(--muted);line-height:1.5;text-align:center">📷<br>圖片<br>上傳後顯示</span>`}
      </div>
      <div class="gallery-info">
        <span class="gallery-code">#${p.id}</span>
        <div class="gallery-name">${p.name}</div>
        <div class="gallery-price">NT$${p.price.toLocaleString()}</div>
        ${p.stock==='low'?'<span class="gallery-stock gs-low">快售完</span>':''}
        ${p.stock==='out'?'<span class="gallery-stock gs-out">已售完</span>':''}
      </div>
    </div>`).join('');
}

// ── 商品 Modal ──
function openProdModal(pid){
  currentPid=pid; currentSize=null; qty=1;
  const p=PRODUCTS.find(x=>x.id===pid);
  document.getElementById('modalThumb').innerHTML=p.img?`<img src="${p.img}" alt="${p.name}">`:'📷';
  document.getElementById('modalName').textContent=p.name;
  document.getElementById('modalPrice').textContent=`NT$${p.price.toLocaleString()}`;
  const ss=document.getElementById('modalSizeSection');
  if(p.sizes.length){
    ss.style.display='block';
    document.getElementById('modalSizeRow').innerHTML=p.sizes.map(s=>
      `<button class="size-btn" onclick="pickSize('${s}',this)">${s}</button>`
    ).join('');
  } else { ss.style.display='none'; }
  updateModalSubtotal();
  document.getElementById('prodModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeProdModal(){
  document.getElementById('prodModal').classList.remove('open');
  document.body.style.overflow='';
}
function pickSize(s,btn){
  currentSize=s;
  document.querySelectorAll('#modalSizeRow .size-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function chQty(d){
  qty=Math.max(1,Math.min(10,qty+d));
  document.getElementById('qtyNum').textContent=qty;
  updateModalSubtotal();
}
function updateModalSubtotal(){
  const p=PRODUCTS.find(x=>x.id===currentPid);
  if(p) document.getElementById('modalSubtotal').textContent=`NT$${(p.price*qty).toLocaleString()}`;
  document.getElementById('qtyNum').textContent=qty;
}

// ── 加入購物清單 ──
function addToCart(){
  const p=PRODUCTS.find(x=>x.id===currentPid);
  if(!p){toast('請先選擇商品');return;}
  if(p.sizes.length&&!currentSize){toast('請選擇尺寸');return;}
  cartItems.push({uid:Date.now(),pid:p.id,name:p.name,size:currentSize||'—',qty,price:p.price*qty});
  closeProdModal();
  renderInlineCart();
  updateFab();
  toast(`✓ 已加入！目前共 ${cartItems.reduce((a,x)=>a+x.qty,0)} 件`);
}

// ── 購物清單 Modal ──
function openCartModal(){
  if(!cartItems.length){toast('購物清單是空的');return;}
  renderCartModal();
  document.getElementById('cartModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeCartModal(){
  document.getElementById('cartModal').classList.remove('open');
  document.body.style.overflow='';
}
function renderCartModal(){
  const total=cartItems.reduce((a,x)=>a+x.price,0);
  const totalQty=cartItems.reduce((a,x)=>a+x.qty,0);
  document.getElementById('cartModalCount').textContent=`(${totalQty} 件)`;
  document.getElementById('cartModalTotal').textContent=`NT$${total.toLocaleString()}`;
  document.getElementById('cartModalRows').innerHTML=cartItems.length
    ?cartItems.map(x=>`
      <div class="cart-modal-row">
        <div class="cmi-info">${x.name}<div class="cmi-sub">尺寸：${x.size}・數量：${x.qty}</div></div>
        <span class="cmi-price">NT$${x.price.toLocaleString()}</span>
        <button class="cmi-del" onclick="delItem(${x.uid})">×</button>
      </div>`).join('')
    :`<div class="cart-empty-msg">清單是空的，<br>去挑幾樣喜歡的吧！</div>`;
}
function delItem(uid){
  cartItems=cartItems.filter(x=>x.uid!==uid);
  renderCartModal();
  renderInlineCart();
  updateFab();
}

// ── inline 購物清單 ──
function renderInlineCart(){
  const wrap=document.getElementById('cartWrap');
  if(!cartItems.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  const total=cartItems.reduce((a,x)=>a+x.price,0);
  const totalQty=cartItems.reduce((a,x)=>a+x.qty,0);
  document.getElementById('cartBadge').textContent=totalQty+'件';
  document.getElementById('cartTotal').textContent='NT$'+total.toLocaleString();
  document.getElementById('cartRows').innerHTML=cartItems.map(x=>`
    <div class="cart-row">
      <div class="cart-item-info">${x.name}<div class="cart-item-sub">尺寸：${x.size}・數量：${x.qty}</div></div>
      <span class="cart-price">NT$${x.price.toLocaleString()}</span>
      <button class="cart-del" onclick="delItem(${x.uid})">×</button>
    </div>`).join('');
}

// ── FAB 購物車 ──
function updateFab(){
  const fab=document.getElementById('fabCart');
  const total=cartItems.reduce((a,x)=>a+x.qty,0);
  if(total>0){fab.style.display='flex';document.getElementById('fabCount').textContent=total;}
  else{fab.style.display='none';}
}

// ── 送出訂單 ──
function submitOrder(){
  if(!cartItems.length){toast('請先選擇商品並加入清單');return;}
  const name=document.getElementById('lineName').value.trim();
  if(!name){toast('請填寫 LINE 名稱');return;}
  const note=document.getElementById('note').value.trim();
  const oid='ORD-'+new Date().toISOString().slice(0,7).replace('-','')+'-'+Math.floor(1000+Math.random()*9000);
  lastOrderId=oid;
  const total=cartItems.reduce((a,x)=>a+x.price,0);
  const itemLines=cartItems.map(x=>`• ${x.name}（${x.size}）×${x.qty}　NT$${x.price.toLocaleString()}`).join('\n');
  lastLineMsg=`【Cutie & Pick Kids 下單】\n訂單編號：${oid}\nLINE名稱：${name}\n\n${itemLines}\n\n商品小計：NT$${total.toLocaleString()}\n${note?'備註：'+note+'\n':''}`;
  document.getElementById('successId').textContent=oid;
  document.getElementById('sumRows').innerHTML=cartItems.map(x=>`
    <div class="sum-row">
      <div class="sum-row-name">${x.name}<div class="sum-row-sub">尺寸：${x.size}・數量：${x.qty}</div></div>
      <span class="sum-row-price">NT$${x.price.toLocaleString()}</span>
    </div>`).join('');
  document.getElementById('sumTotal').textContent='NT$'+total.toLocaleString();
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='處理中...';
  setTimeout(()=>{
    btn.disabled=false;
    btn.innerHTML='確認送出下單 <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    document.getElementById('successModal').classList.add('open');
    document.body.style.overflow='hidden';
    document.getElementById('fabCart').style.display='none';
  },800);
}

function jumpToLine(){
  const msg=lastLineMsg.replace(/\n/g,'\n');
  navigator.clipboard&&navigator.clipboard.writeText(msg.replace(/\\n/g,'\n'))
    .then(()=>toast('訊息已複製！請在 LINE 貼上傳送'));
  const url=`https://line.me/R/ti/p/${encodeURIComponent(LINE_ID)}`;
  setTimeout(()=>{try{window.location.href=url;}catch(e){window.open(url,'_blank');}},400);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// 點遮罩關閉 modal
['prodModal','cartModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){
    if(e.target===this){
      this.classList.remove('open');
      document.body.style.overflow='';
    }
  });
});

renderGallery();
</script>
</body>
</html>
